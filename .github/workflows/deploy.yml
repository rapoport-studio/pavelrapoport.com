# Deploy apps to Cloudflare Workers via OpenNext
name: Deploy

on:
  push:
    branches: [dev, staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      studio: ${{ steps.changes.outputs.studio }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - '.github/workflows/deploy.yml'
            studio:
              - 'apps/studio/**'
              - 'packages/**'
              - '.github/workflows/deploy.yml'

  deploy-web:
    name: Deploy Web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Load secrets from Infisical
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" || { echo "::error::Missing INFISICAL_CLIENT_ID GitHub secret"; exit 1; }
          test -n "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" || { echo "::error::Missing INFISICAL_CLIENT_SECRET GitHub secret"; exit 1; }

          infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --silent

          infisical export \
            --projectId="1262d7b5-45e7-4fc6-9545-85fc60e42a47" \
            --env="${{ github.ref_name == 'main' && 'prod' || github.ref_name }}" \
            --format=dotenv \
          | sed 's/\r$//' >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo Cache
        uses: rharkor/caching-for-turbo@v1.7

      - name: Build (Next.js)
        run: pnpm turbo build --filter=@repo/web

      - name: Build (OpenNext → Cloudflare)
        run: pnpm --filter @repo/web exec opennextjs-cloudflare build

      - name: Verify Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing CLOUDFLARE_API_TOKEN env var (check Infisical)"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::Missing CLOUDFLARE_ACCOUNT_ID env var (check Infisical)"; exit 1; }

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  deploy-studio:
    name: Deploy Studio
    needs: detect-changes
    if: needs.detect-changes.outputs.studio == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Load secrets from Infisical
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" || { echo "::error::Missing INFISICAL_CLIENT_ID GitHub secret"; exit 1; }
          test -n "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" || { echo "::error::Missing INFISICAL_CLIENT_SECRET GitHub secret"; exit 1; }

          infisical login --method=universal-auth \
            --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
            --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
            --silent

          infisical export \
            --projectId="1262d7b5-45e7-4fc6-9545-85fc60e42a47" \
            --env="${{ github.ref_name == 'main' && 'prod' || github.ref_name }}" \
            --format=dotenv \
          | sed 's/\r$//' >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo Cache
        uses: rharkor/caching-for-turbo@v1.7

      - name: Build (Next.js)
        run: pnpm turbo build --filter=@repo/studio

      - name: Build (OpenNext → Cloudflare)
        run: pnpm --filter @repo/studio exec opennextjs-cloudflare build

      - name: Verify Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing CLOUDFLARE_API_TOKEN env var (check Infisical)"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::Missing CLOUDFLARE_ACCOUNT_ID env var (check Infisical)"; exit 1; }

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/studio
          command: deploy
